<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="200" height="200" rx="40" ry="40"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="40" ry="40" fill="url(#bg)"/>

  <!-- Channel tiles - left column (ungrouped) -->
  <!-- Tile 1 -->
  <rect x="22" y="30" width="72" height="18" rx="4" fill="#2a2a4a"/>
  <circle cx="33" cy="39" r="6" fill="#444466"/>
  <rect x="44" y="35" width="40" height="4" rx="2" fill="#555580"/>
  <rect x="44" y="41" width="26" height="3" rx="1.5" fill="#3a3a5a"/>

  <!-- Tile 2 -->
  <rect x="22" y="54" width="72" height="18" rx="4" fill="#2a2a4a"/>
  <circle cx="33" cy="63" r="6" fill="#444466"/>
  <rect x="44" y="59" width="34" height="4" rx="2" fill="#555580"/>
  <rect x="44" y="65" width="22" height="3" rx="1.5" fill="#3a3a5a"/>

  <!-- Tile 3 -->
  <rect x="22" y="78" width="72" height="18" rx="4" fill="#2a2a4a"/>
  <circle cx="33" cy="87" r="6" fill="#444466"/>
  <rect x="44" y="83" width="38" height="4" rx="2" fill="#555580"/>
  <rect x="44" y="89" width="28" height="3" rx="1.5" fill="#3a3a5a"/>

  <!-- Arrow -->
  <path d="M104 84 L118 84 M112 78 L118 84 L112 90" stroke="#FF4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bucket / grouped area - right side -->
  <!-- Bucket container -->
  <rect x="126" y="24" width="54" height="72" rx="8" fill="#1e1e3a" stroke="#FF4444" stroke-width="1.5"/>
  <!-- Bucket label tab -->
  <rect x="130" y="18" width="30" height="10" rx="3" fill="#FF4444"/>

  <!-- Grouped tiles inside bucket -->
  <rect x="131" y="32" width="44" height="10" rx="3" fill="#2e2e5a"/>
  <circle cx="138" cy="37" r="3.5" fill="#4a4a7a"/>
  <rect x="144" y="34" width="24" height="3" rx="1.5" fill="#555580"/>

  <rect x="131" y="46" width="44" height="10" rx="3" fill="#2e2e5a"/>
  <circle cx="138" cy="51" r="3.5" fill="#4a4a7a"/>
  <rect x="144" y="48" width="18" height="3" rx="1.5" fill="#555580"/>

  <rect x="131" y="60" width="44" height="10" rx="3" fill="#2e2e5a"/>
  <circle cx="138" cy="65" r="3.5" fill="#4a4a7a"/>
  <rect x="144" y="62" width="28" height="3" rx="1.5" fill="#555580"/>

  <!-- Unsubscribe X mark - bottom right area -->
  <circle cx="153" cy="138" r="24" fill="#FF4444"/>
  <line x1="143" y1="128" x2="163" y2="148" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="163" y1="128" x2="143" y2="148" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Small subscriptions count badge feel -->
  <rect x="22" y="114" width="72" height="66" rx="8" fill="#1e1e3a" stroke="#333355" stroke-width="1"/>
  <rect x="30" y="124" width="55" height="4" rx="2" fill="#2e2e5a"/>
  <rect x="30" y="132" width="40" height="4" rx="2" fill="#2e2e5a"/>
  <rect x="30" y="140" width="48" height="4" rx="2" fill="#2e2e5a"/>
  <rect x="30" y="148" width="35" height="4" rx="2" fill="#2e2e5a"/>
  <rect x="30" y="156" width="44" height="4" rx="2" fill="#2e2e5a"/>
  <rect x="30" y="164" width="30" height="4" rx="2" fill="#2e2e5a"/>
  <!-- strikethrough lines over some rows -->
  <line x1="30" y1="134" x2="70" y2="134" stroke="#FF444488" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="142" x2="78" y2="142" stroke="#FF444488" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="166" x2="60" y2="166" stroke="#FF444488" stroke-width="1.5" stroke-linecap="round"/>
</svg>
